{{ define "content" }}

<h2 style="
        margin-top:0;
        color:#ffffff;
        font-size:28px;
    ">
    Password Changed
</h2>

<p style="
        color:#cbd5e1;
        line-height:1.7;
        font-size:15px;
    ">
    Hi {{ .DisplayName }},
</p>

<p style="
        color:#cbd5e1;
        line-height:1.7;
        font-size:15px;
    ">
    The password for your Cosmix account was changed successfully.
</p>

<p style="
        color:#cbd5e1;
        line-height:1.7;
        font-size:15px;
    ">
    If you made this change, no further action is required.
</p>

<div style="
        margin-top:24px;
        padding:16px;
        border-radius:8px;
        background:#1e293b;
    ">
    <p style="
            margin:0;
            color:#fca5a5;
            font-size:14px;
            line-height:1.6;
        ">
        If you did not change your password, secure your account immediately and contact support.
    </p>
</div>

{{ end }}
