{{ define "base" }}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ .Title }}</title>
</head>

<body style="
        margin:0;
        padding:0;
        background:#0f172a;
        font-family:Arial,sans-serif;
        color:#ffffff;
    ">
    <table width="100%" cellpadding="0" cellspacing="0" style="
            padding:40px 0;
        ">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" style="
                        background:#111827;
                        border-radius:16px;
                        overflow:hidden;
                    ">
                    <tr>
                        <td style="
                                padding:32px;
                            ">
                            {{ template "header" . }}

                            {{ template "content" . }}

                            {{ template "footer" . }}
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>

</html>

{{ end }}
