syntax = "proto3";

package user;

option go_package = "cosmix/shared/gen/go/user";

import "google/protobuf/timestamp.proto";

service UserService {
  rpc GetProfile(GetProfileRequest)
      returns (UserProfileResponse);

  rpc GetProfileByUsername(
      GetProfileByUsernameRequest
  ) returns (
      UserProfileResponse
  );

  rpc UpdateProfile(UpdateProfileRequest)
      returns (UserProfileResponse);

  rpc Follow(FollowRequest)
      returns (FollowResponse);

  rpc Unfollow(UnfollowRequest)
      returns (UnfollowResponse);

  rpc GetFollowers(GetFollowersRequest)
      returns (UserListResponse);

  rpc GetFollowing(GetFollowingRequest)
      returns (UserListResponse);
}

message GetProfileRequest {
  uint64 user_id = 1;
}

message GetProfileByUsernameRequest {
  string username = 1;
}

message UpdateProfileRequest {
  uint64 user_id = 1;

  optional string display_name = 2;
  optional string username = 3;
  optional string date_of_birth = 4;
  optional string avatar_url = 5;
  optional string bio = 6;
}

message FollowRequest {
  uint64 follower_id = 1;
  uint64 following_id = 2;
}

message UnfollowRequest {
  uint64 follower_id = 1;
  uint64 following_id = 2;
}

message GetFollowersRequest {
  uint64 user_id = 1;
}

message GetFollowingRequest {
  uint64 user_id = 1;
}

message FollowResponse {
  string message = 1;
}

message UnfollowResponse {
  string message = 1;
}

message UserProfileResponse {
  User user = 1;
}

message UserListResponse {
  repeated User users = 1;
}

message User {
  uint64 id = 1;
  string display_name = 2;
  string username = 3;
  string email = 4;

  bool is_private = 5;
  bool is_active = 6;

  google.protobuf.Timestamp date_of_birth = 7;

  optional string avatar_url = 8;
  optional string bio = 9;

  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}